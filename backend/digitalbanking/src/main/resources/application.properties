spring.application.name=${SPRING_APP_NAME:digitalbanking}
server.port=8081
spring.security.user.name=${SPRING_USERNAME:sam}
spring.security.user.password=${SPRING_PASSWORD:12345}
spring.config.import=application-prod.properties
spring.profiles.active=default

spring.datasource.url=jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3307}/${DATABASE_NAME:easybank}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:true}
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:TRACE}

server.servlet.session.timeout=${SESSION_TIMEOUT:2m}

logging.pattern.console= ${LOGPATTERN_CONSOLE:%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n}

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWK_SET_URI:http://localhost:9000/oauth2/jwks}



